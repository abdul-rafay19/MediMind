version: '3.9'

services:
  backend:
    build: ./backend
    container_name: medimind-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-medimind-secret-change-in-prod}
      - DATABASE_URL=sqlite+aiosqlite:///./medimind.db
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173","http://localhost:8080"]
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - KNOWLEDGE_BASE_DIR=/app/data/knowledge_base
    volumes:
      - ./backend/data:/app/data
      - medimind_db:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: medimind-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  medimind_db:
